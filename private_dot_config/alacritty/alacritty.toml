[general]
import = [ "~/.config/alacritty/theme.toml" ]

[font]
size = 12.0

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[window]
opacity = 0

[window.padding]
x = 5
y = 5

[selection]
save_to_clipboard = true

[terminal]
shell = "/bin/fish"

[cursor.style]
shape = "Beam"
blinking = "On"
